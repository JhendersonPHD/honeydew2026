name: HoneyDew2026 CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      backend:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Set up Python ${{ env.PYTHON_VERSION }}
            uses: actions/setup-python@v5
            with:
              python-version: ${{ env.PYTHON_VERSION }}
          - name: Install dependencies
            run: |
              cd backend
              pip install -r requirements.txt
              pip install pytest pytest-cov -q
          - name: Run linter
            run: |
              pip install flake8 -q
              flake8 backend/ --max-line-length=100 --exclude=.venv,__pycache__
          - name: Run tests
            run: |
              cd backend
              pytest -v --tb=short

      frontend:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Set up Node.js ${{ env.NODE_VERSION }}
            uses: actions/setup-node@v4
            with:
              node-version: ${{ env.NODE_VERSION }}
          - name: Install dependencies
            run: |
              cd frontend
              npm ci
          - name: Run linter
            run: |
              cd frontend
              npm run lint
          - name: Run tests
            run: |
              cd frontend
              npm run test -- --watchAll=false

  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker images
        run: |
          docker-compose build
      
      - name: Run health checks
        run: |
          docker-compose up -d
          sleep 10
          docker-compose exec -T backend curl -f http://localhost:8017/api/products/ || exit 1
          docker-compose exec -T frontend curl -f http://localhost:3021/ || exit 1
          docker-compose down

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Deploy to production
        run: |
          echo "Deployment would happen here"
          echo "SSH to production server and run docker-compose pull && docker-compose up -d"
