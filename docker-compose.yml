version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: honeydew2026-backend
    container_name: honeydew-api
    ports:
      - "8018:8018"
    environment:
      - NODE_ENV=production
      - PORT=8018
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-changeme-in-production}
      - CORS_ORIGINS=https://honeydew2026.netlify.app,http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8018/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: honeydew2026-frontend
    container_name: honeydew-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8018/api
    depends_on:
      - backend
    restart: unless-stopped

# Note: For production, use nginx or a static hosting provider (Netlify/Vercel)
# The frontend Dockerfile should serve static files, not proxy to backend
