[build]
  command = "npm run build"
  publish = "dist"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "18"

# API redirects - configure backend URL via environment variable
# Set NETLIFY_API_URL environment variable in Netlify dashboard
# or use a service like Render to host the backend

[[redirects]]
  from = "/api/*"
  to = "https://honeydew-api.onrender.com/api/:splat"
  status = 200
  force = false

# Alternative: If using a different backend URL, set the NETLIFY_API_URL
# environment variable in Netlify dashboard and use this instead:
# [[redirects]]
#   from = "/api/*"
#   to = "https://PLACEHOLDER_BACKEND_URL/api/:splat"
#   status = 200
#   force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[dev]
  command = "npm run dev"
  port = 3016
  targetPort = 3016

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200